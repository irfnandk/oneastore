<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTI One Class | Portofolio Kelas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#0F4C81;
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --text:#0F172A;
  --muted:#64748B;
  --border:#E5E7EB;
}
body.dark{
  --bg:#0B1220;
  --card:#111827;
  --text:#F9FAFB;
  --muted:#9CA3AF;
  --border:#1F2937;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);z-index:100}
body.dark header{background:#111}
.nav{max-width:1200px;margin:auto;padding:18px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:Poppins;font-weight:700;color:var(--primary)}
.nav-menu{display:flex;gap:20px;align-items:center}
.nav-menu a{font-size:14px;color:var(--muted);cursor:pointer}
.toggle{padding:6px 12px;border:1px solid var(--border);border-radius:999px;cursor:pointer}
section{max-width:1200px;margin:80px auto;padding:0 20px}
.members{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.member{background:var(--card);padding:20px;border-radius:16px;text-align:center;border:1px solid var(--border)}
.badge{padding:4px 8px;border-radius:999px;font-size:11px;color:#fff}
.ketua{background:#2563EB}
.sekretaris{background:#059669}
.bendahara{background:#D97706}
.anggota{background:#64748B}
.news-card{background:var(--card);padding:20px;border-radius:16px;margin-bottom:20px;border:1px solid var(--border)}
.btn{padding:8px 14px;border:none;border-radius:8px;background:var(--primary);color:white;cursor:pointer}
input,select{width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid var(--border)}
#dashboard{display:none}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo">PTI One Class</div>
<div class="nav-menu">
<a href="#anggota">Anggota</a>
<a id="notifTunggakan"></a>
<a onclick="openLogin()">Login</a>
<div class="toggle" onclick="toggleDark()">Dark</div>
</div>
</div>
</header>

<section>
<h1>Website Resmi PTI One Class</h1>
<p>Dashboard kelas modern.</p>
</section>

<section id="anggota">
<h2>Struktur Kelas</h2>
<p id="jumlahAnggota"></p>
<div class="members" id="members"></div>
</section>

<section id="dashboard">
<h2>Dashboard Keuangan</h2>
<button onclick="logout()" class="btn" style="background:#ef4444">Logout</button>

<div class="news-card">
<h3>Total Saldo</h3>
<h2 id="totalKas">Rp 0</h2>
</div>

<div class="news-card">
<h3>Tambah Transaksi</h3>
<input id="namaTransaksi" placeholder="Nama">
<select id="jenisTransaksi">
<option value="masuk">Kas Masuk</option>
<option value="keluar">Kas Keluar</option>
</select>
<input id="jumlahTransaksi" type="number" placeholder="Jumlah">
<button onclick="tambahKas()" class="btn">Simpan</button>
</div>

<div class="news-card">
<h3>Riwayat Kas</h3>
<div id="riwayatKas"></div>
</div>

<div class="news-card">
<h3>Grafik Kas</h3>
<canvas id="grafikKas"></canvas>
</div>

<div class="news-card">
<h3>Status Iuran</h3>
<div id="listIuran"></div>
<button onclick="exportCSV()" class="btn">Export CSV</button>
</div>

<div class="news-card">
<h3>Riwayat Pembayaran</h3>
<div id="riwayatPembayaran"></div>
</div>

<div class="news-card">
<h3>Statistik</h3>
<canvas id="pieChart"></canvas>
</div>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center">
<div style="background:white;padding:30px;border-radius:16px;width:90%;max-width:400px">
<h3>Login</h3>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()" class="btn" style="width:100%">Login</button>
</div>
</div>

<!-- PAYMENT MODAL -->
<div id="paymentModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center">
<div style="background:white;padding:25px;border-radius:16px;width:90%;max-width:400px">
<h3>Pembayaran Iuran</h3>
<p id="payNama"></p>
<input id="payNominal" type="number" placeholder="Nominal">
<input id="payBukti" type="file" accept="image/*">
<img id="previewBukti" style="width:100%;margin-top:10px;display:none;border-radius:10px"/>
<button onclick="submitPayment()" class="btn" style="width:100%;margin-top:10px">Simpan</button>
<button onclick="closePayment()" class="btn" style="width:100%;margin-top:6px;background:#ccc;color:black">Batal</button>
</div>
</div>

<script>
/* DARK MODE */
function toggleDark(){
document.body.classList.toggle('dark');
localStorage.setItem('dark',document.body.classList.contains('dark'));
}
if(localStorage.getItem('dark')==="true") document.body.classList.add('dark');

/* DATA */
let anggota=[
{nama:"IMAM",jabatan:"Ketua Kelas"},
{nama:"BILLY",jabatan:"Wakil Ketua"},
{nama:"JULIA",jabatan:"Sekretaris"},
{nama:"REGITA",jabatan:"Bendahara"},
{nama:"ANGGOTA 1",jabatan:"Anggota"},
{nama:"ANGGOTA 2",jabatan:"Anggota"}
];

function renderAnggota(){
members.innerHTML="";
anggota.forEach(a=>{
members.innerHTML+=`
<div class="member">
<h4>${a.nama}</h4>
<span class="badge anggota">${a.jabatan}</span>
</div>`;
});
jumlahAnggota.innerText="Total: "+anggota.length;
}
renderAnggota();

/* LOGIN */
let users=[{username:"admin",password:"ptiadmin"},{username:"viewer",password:"ptiuser"}];
let currentUser=JSON.parse(localStorage.getItem("ptiUser"))||null;

function openLogin(){loginModal.style.display="flex";}
function login(){
let found=users.find(x=>x.username===loginUser.value && x.password===loginPass.value);
if(found){
currentUser=found;
localStorage.setItem("ptiUser",JSON.stringify(found));
loginModal.style.display="none";
checkAccess();
}
}
function logout(){localStorage.removeItem("ptiUser");location.reload();}
function checkAccess(){dashboard.style.display=currentUser?"block":"none";}
checkAccess();

/* KAS */
let kas=JSON.parse(localStorage.getItem("kasPTI"))||[];
function tambahKas(){
kas.push({nama:namaTransaksi.value,jenis:jenisTransaksi.value,jumlah:parseInt(jumlahTransaksi.value),tanggal:new Date()});
localStorage.setItem("kasPTI",JSON.stringify(kas));
renderKas();
}
function renderKas(){
let total=0;
riwayatKas.innerHTML="";
kas.forEach(k=>{
if(k.jenis==="masuk") total+=k.jumlah; else total-=k.jumlah;
riwayatKas.innerHTML+=`${k.nama} - ${k.jenis} - Rp ${k.jumlah}<br>`;
});
totalKas.innerText="Rp "+total;
renderChart();
}
function renderChart(){
let bulan={};
kas.forEach(k=>{
let b=new Date(k.tanggal).getMonth();
bulan[b]=(bulan[b]||0)+(k.jenis==="masuk"?k.jumlah:-k.jumlah);
});
if(window.barChart) window.barChart.destroy();
window.barChart=new Chart(grafikKas,{type:"bar",data:{labels:Object.keys(bulan),datasets:[{label:"Kas",data:Object.values(bulan)}]}});
}
renderKas();

/* IURAN + RIWAYAT */
let iuran=JSON.parse(localStorage.getItem("iuran"))||{};
let riwayatPembayaran=JSON.parse(localStorage.getItem("riwayatBayar"))||[];
let target=50000;
let paymentTarget="";
let buktiBase64="";

function renderIuran(){
listIuran.innerHTML="";
let belum=0;
anggota.forEach(a=>{
if(!iuran[a.nama]) iuran[a.nama]=0;
let lunas=iuran[a.nama]>=target;
if(!lunas) belum++;
let warna=lunas?"#16a34a":"#dc2626";
let bg=lunas?"#dcfce7":"#fee2e2";
listIuran.innerHTML+=`
<div style="margin-bottom:10px;padding:8px;border-radius:8px;background:${bg};border:1px solid ${warna}">
<strong>${a.nama}</strong><br>
<span style="color:${warna};font-weight:bold">${lunas?"LUNAS":"NUNGGAK"}</span>
(Rp ${iuran[a.nama]} / Rp ${target})
<button onclick="openPayment('${a.nama}')" style="margin-left:10px;padding:4px 8px;border:none;background:#2563EB;color:white;border-radius:6px;font-size:12px">Bayar</button>
</div>`;
});
notifTunggakan.innerText=belum>0?"🔴 "+belum+" Nunggak":"🟢 Semua Lunas";
renderPie();
}
renderIuran();

function openPayment(nama){paymentTarget=nama;payNama.innerText="Nama: "+nama;paymentModal.style.display="flex";}
function closePayment(){paymentModal.style.display="none";payNominal.value="";previewBukti.style.display="none";}

payBukti.addEventListener("change",e=>{
let file=e.target.files[0];
if(!file) return;
let reader=new FileReader();
reader.onload=()=>{buktiBase64=reader.result;previewBukti.src=buktiBase64;previewBukti.style.display="block";};
reader.readAsDataURL(file);
});

function submitPayment(){
let nominal=parseInt(payNominal.value);
if(!nominal||nominal<=0) return alert("Nominal tidak valid");
iuran[paymentTarget]=(iuran[paymentTarget]||0)+nominal;
kas.push({nama:"Iuran - "+paymentTarget,jenis:"masuk",jumlah:nominal,tanggal:new Date()});
riwayatPembayaran.push({nama:paymentTarget,jumlah:nominal,tanggal:new Date().toLocaleString(),bukti:buktiBase64});
localStorage.setItem("iuran",JSON.stringify(iuran));
localStorage.setItem("kasPTI",JSON.stringify(kas));
localStorage.setItem("riwayatBayar",JSON.stringify(riwayatPembayaran));
renderIuran();renderKas();renderRiwayat();closePayment();
}

function renderRiwayat(){
riwayatPembayaranDiv=document.getElementById("riwayatPembayaran");
riwayatPembayaranDiv.innerHTML="";
riwayatPembayaran.forEach((r,i)=>{
riwayatPembayaranDiv.innerHTML+=`
<div style="border-bottom:1px solid #ccc;padding:8px 0">
<strong>${r.nama}</strong> - Rp ${r.jumlah}<br>
<small>${r.tanggal}</small><br>
${r.bukti?`<img src="${r.bukti}" style="width:100px;border-radius:6px">`:""}
<button onclick="hapus(${i})" style="background:#ef4444;color:white;border:none;padding:4px 8px;border-radius:6px;font-size:12px;margin-top:5px">Hapus</button>
</div>`;
});
}
renderRiwayat();

function hapus(i){
let data=riwayatPembayaran[i];
iuran[data.nama]-=data.jumlah;
let indexKas=kas.findIndex(k=>k.nama==="Iuran - "+data.nama && k.jumlah===data.jumlah);
if(indexKas!==-1) kas.splice(indexKas,1);
riwayatPembayaran.splice(i,1);
localStorage.setItem("riwayatBayar",JSON.stringify(riwayatPembayaran));
localStorage.setItem("iuran",JSON.stringify(iuran));
localStorage.setItem("kasPTI",JSON.stringify(kas));
renderIuran();renderKas();renderRiwayat();
}

function renderPie(){
let lunas=0,belum=0;
anggota.forEach(a=>{if(iuran[a.nama]>=target) lunas++; else belum++;});
if(window.pieChart) window.pieChart.destroy();
window.pieChart=new Chart(pieChart,{type:"pie",data:{labels:["Lunas","Belum"],datasets:[{data:[lunas,belum]}]}});
}

function exportCSV(){
let data="Nama,Bayar\n";
anggota.forEach(a=>{data+=`${a.nama},${iuran[a.nama]||0}\n`;});
let blob=new Blob([data],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="iuran_pti.csv";
link.click();
}
</script>

</body>
</html>
