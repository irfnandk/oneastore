<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manajemen Iuran Kas - Versi Lengkap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Inter', sans-serif;
    background-color: #f0f4f8;
    margin: 0;
    padding: 20px;
    color: #0f172a;
  }
  h1 {
    text-align: center;
    margin-bottom: 20px;
  }
  .section {
    margin-bottom: 40px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    padding: 20px;
  }
  .card h2 {
    margin-top: 0;
  }
  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    font-family: 'Inter', sans-serif;
  }
  button {
    background-color: #0F4C81;
    color: #fff;
    border: none;
    cursor: pointer;
    margin-top: 15px;
  }
  button:hover {
    background-color: #155e75;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #e5e7eb;
    padding: 8px;
    text-align: center;
  }
  th {
    background-color: #0f4c81;
    color: #fff;
  }
  .btn-small {
    padding: 4px 8px;
    font-size: 0.8em;
    border-radius: 4px;
    cursor: pointer;
  }
  /* Untuk statistik dan ringkasan */
  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    min-width: 150px;
    background: #e0f2fe;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
  }
  .stat-box h3 {
    margin: 0;
    font-size: 1.2em;
  }
</style>
</head>
<body>

<h1>Manajemen Iuran Kas - Versi Lengkap</h1>

<!-- Manajemen Anggota -->
<div class="section">
  <div class="card">
    <h2>Daftar dan Kelola Anggota</h2>
    <input type="text" id="namaAnggota" placeholder="Nama Anggota Baru" />
    <button onclick="tambahAnggota()">Tambah Anggota</button>
    <table id="tabelAnggota">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Form Pembayaran -->
<div class="section">
  <div class="card">
    <h2>Input Pembayaran</h2>
    <select id="selectAnggota">
      <option value="">Pilih Anggota</option>
    </select>
    <input type="number" id="jumlahBayar" placeholder="Jumlah (Rp)" />
    <button onclick="prosesPembayaran()">Bayar</button>
  </div>
</div>

<!-- Statistik dan Ringkasan -->
<div class="section">
  <div class="card">
    <h2>Statistik dan Ringkasan</h2>
    <div class="stats">
      <div class="stat-box">
        <h3 id="totalPembayaran">Rp 0</h3>
        <p>Total Pembayaran</p>
      </div>
      <div class="stat-box">
        <h3 id="jumlahAnggota">0</h3>
        <p>Jumlah Anggota</p>
      </div>
      <div class="stat-box">
        <h3 id="trenBulanan">Rp 0</h3>
        <p>Tren Bulanan</p>
      </div>
    </div>
  </div>
</div>

<!-- Laporan & Pengelolaan Transaksi -->
<div class="section">
  <div class="card">
    <h2>Laporan Pembayaran & Pengelolaan</h2>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <button onclick="resetData()">Reset Data</button>
      <button onclick="exportLaporanCSV()">Export Seluruh Data</button>
    </div>
    <div>
      <label for="filterBulan">Filter Bulan:</label>
      <input type="month" id="filterBulan" onchange="renderLaporan()" />
    </div>
    <table id="tabelLaporan">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Anggota</th>
          <th>Jumlah (Rp)</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  // Data utama
  let anggota = JSON.parse(localStorage.getItem('anggota')) || [];
  let pembayaran = JSON.parse(localStorage.getItem('pembayaran')) || [];

  // Fungsi Tambah Anggota
  function tambahAnggota() {
    const nama = document.getElementById('namaAnggota').value.trim();
    if(!nama){
      alert('Isi nama anggota!');
      return;
    }
    if(anggota.includes(nama)){
      alert('Nama sudah terdaftar!');
      return;
    }
    anggota.push(nama);
    localStorage.setItem('anggota', JSON.stringify(anggota));
    document.getElementById('namaAnggota').value='';
    renderDaftarAnggota();
    renderPilihanAnggota();
    renderStatistik();
  }

  // Render daftar anggota
  function renderDaftarAnggota() {
    const tbody = document.querySelector('#tabelAnggota tbody');
    tbody.innerHTML='';
    anggota.forEach((a, index) => {
      tbody.innerHTML+=`
        <tr>
          <td>${a}</td>
          <td>
            <button class="btn-small" onclick="editAnggota('${a}')">Edit</button>
            <button class="btn-small" onclick="hapusAnggota('${a}')">Hapus</button>
          </td>
        </tr>`;
    });
  }

  function hapusAnggota(nama) {
    if(confirm('Hapus anggota ini?')){
      anggota = anggota.filter(a => a!==nama);
      localStorage.setItem('anggota', JSON.stringify(anggota));
      renderDaftarAnggota();
      renderPilihanAnggota();
      renderStatistik();
    }
  }

  function editAnggota(nama) {
    const newNama = prompt('Edit nama anggota:', nama);
    if(newNama){
      newNama.trim();
      if(newNama && !anggota.includes(newNama)){
        // Update di array
        anggota = anggota.map(a => a===nama ? newNama : a);
        localStorage.setItem('anggota', JSON.stringify(anggota));
        renderDaftarAnggota();
        renderPilihanAnggota();
      } else {
        alert('Nama tidak valid atau sudah terdaftar!');
      }
    }
  }

  // Render pilihan anggota di form pembayaran
  function renderPilihanAnggota() {
    const select = document.getElementById('selectAnggota');
    select.innerHTML='<option value="">Pilih Anggota</option>';
    anggota.forEach(a => {
      select.innerHTML+=`<option value="${a}">${a}</option>`;
    });
  }

  // Proses pembayaran
  function prosesPembayaran() {
    const anggotaPilih = document.getElementById('selectAnggota').value;
    const jumlah = parseInt(document.getElementById('jumlahBayar').value);
    if(!anggotaPilih || isNaN(jumlah) || jumlah<=0){
      alert('Isi data dengan benar!');
      return;
    }
    const now = new Date();
    pembayaran.push({anggota: anggotaPilih, jumlah, tanggal: now});
    localStorage.setItem('pembayaran', JSON.stringify(pembayaran));
    document.getElementById('jumlahBayar').value='';
    renderLaporan();
    renderStatistik();
    alert('Pembayaran berhasil!');
  }

  // Render laporan
  function renderLaporan() {
    const tbody = document.querySelector('#tabelLaporan tbody');
    tbody.innerHTML='';
    const filterBulan = document.getElementById('filterBulan').value;
    let totalBulanan = 0;
    pembayaran.forEach(p => {
      const pDate = new Date(p.tanggal);
      // Filter bulan
      if(filterBulan){
        const [tahun, bulan] = filterBulan.split('-');
        if(pDate.getFullYear()!==parseInt(tahun) || pDate.getMonth()!==parseInt(bulan)-1){
          return;
        }
      }
      tbody.innerHTML+=`
        <tr>
          <td>${pDate.toLocaleString()}</td>
          <td>${p.anggota}</td>
          <td>Rp ${p.jumlah}</td>
          <td>
            <button class="btn-small" onclick="hapusPembayaran('${p.tanggal}')">Hapus</button>
            <button class="btn-small" onclick="editPembayaran('${p.tanggal}')">Edit</button>
          </td>
        </tr>`;
      // Hitung total per bulan
      if(!filterBulan) totalBulanan += p.jumlah;
    });
    // Update tren bulanan
    document.getElementById('trenBulanan').innerText='Rp '+totalBulanan;
  }

  // Hapus pembayaran
  function hapusPembayaran(tanggalStr) {
    if(confirm('Hapus transaksi ini?')){
      pembayaran = pembayaran.filter(p => p.tanggal!==tanggalStr);
      localStorage.setItem('pembayaran', JSON.stringify(pembayaran));
      renderLaporan();
    }
  }

  // Edit pembayaran
  function editPembayaran(tanggalStr) {
    const p = pembayaran.find(p => p.tanggal===tanggalStr);
    if(p){
      const newJumlah = prompt('Jumlah baru (Rp):', p.jumlah);
      if(newJumlah && !isNaN(newJumlah) && newJumlah>0){
        p.jumlah= parseInt(newJumlah);
        localStorage.setItem('pembayaran', JSON.stringify(pembayaran));
        renderLaporan();
        renderStatistik();
      }
    }
  }

  // Render statistik
  function renderStatistik() {
    // Total pembayaran
    let total = 0;
    pembayaran.forEach(p => total+=p.jumlah);
    document.getElementById('totalPembayaran').innerText='Rp '+total;
    // Jumlah anggota
    document.getElementById('jumlahAnggota').innerText=anggota.length;
  }

  // Reset semua data
  function resetData() {
    if(confirm('Yakin ingin reset semua data?')){
      localStorage.clear();
      anggota=[];
      pembayaran=[];
      renderDaftarAnggota();
      renderPilihanAnggota();
      renderLaporan();
      renderStatistik();
    }
  }

  // Export laporan lengkap ke CSV
  function exportLaporanCSV() {
    let csv='Tanggal,Anggota,Jumlah\n';
    pembayaran.forEach(p => {
      csv+=`${new Date(p.tanggal).toLocaleString()},${p.anggota},${p.jumlah}\n`;
    });
    const blob = new Blob([csv], {type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='laporan_iuran_lengkap.csv';
    a.click();
  }

  // Inisialisasi
  renderDaftarAnggota();
  renderPilihanAnggota();
  renderLaporan();
  renderStatistik();

</script>

</body>
</html>
