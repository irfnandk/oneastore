<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manajemen Iuran Kas - Pembayaran Asli & QRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Inter', sans-serif;
    background-color: #f0f4f8;
    margin: 0;
    padding: 20px;
    color: #0f172a;
  }
  h1 {
    text-align: center;
    margin-bottom: 20px;
  }
  .section {
    margin-bottom: 40px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    padding: 20px;
  }
  .card h2 {
    margin-top: 0;
  }
  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    font-family: 'Inter', sans-serif;
  }
  button {
    background-color: #0F4C81;
    color: #fff;
    border: none;
    cursor: pointer;
    margin-top: 15px;
  }
  button:hover {
    background-color: #155e75;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #e5e7eb;
    padding: 8px;
    text-align: center;
  }
  th {
    background-color: #0f4c81;
    color: #fff;
  }
  .btn-small {
    padding: 4px 8px;
    font-size: 0.8em;
    border-radius: 4px;
    cursor: pointer;
  }
  /* Responsif */
  @media(max-width: 768px){
    .stats {
      flex-direction: column;
    }
  }
  /* QR Code Image */
  #qrisCode {
    margin-top: 10px;
    display: none;
    max-width: 200px;
  }
</style>
</head>
<body>

<h1>Manajemen Iuran Kas - Pembayaran Asli & QRIS</h1>

<!-- Input Pembayaran -->
<div class="section" id="sectionPembayaran">
  <div class="card">
    <h2>Input Pembayaran</h2>
    <select id="selectAnggota" onchange="cekTunggakan()">
      <option value="">Pilih Anggota</option>
    </select>
    <div id="tunggakanInfo" style="margin-top:10px; color:red;"></div>
    <input type="number" id="jumlahBayar" placeholder="Jumlah (Rp)" />
    <select id="kategoriIuran">
      <option value="Rutin">Kas Rutin</option>
      <option value="Pribadi">Kas Pribadi</option>
      <option value="Lainnya">Lainnya</option>
    </select>
    <button onclick="prosesPembayaran()">Bayar</button>
    <!-- QRIS Code -->
    <div id="qrisContainer" style="margin-top:15px;">
      <p>Atau bayar via QRIS:</p>
      <img id="qrisCode" src="" alt="QRIS" />
    </div>
  </div>
</div>

<!-- Statistik dan Pengingat -->
<div class="section" id="sectionStatistik">
  <div class="card">
    <h2>Statistik dan Pengingat</h2>
    <div class="stats">
      <div class="stat-box">
        <h3 id="totalPembayaran">Rp 0</h3>
        <p>Total Pembayaran</p>
      </div>
      <div class="stat-box">
        <h3 id="jumlahAnggota">0</h3>
        <p>Jumlah Anggota</p>
      </div>
      <div class="stat-box">
        <h3 id="trenBulanan">Rp 0</h3>
        <p>Tren Bulanan</p>
      </div>
    </div>
  </div>
</div>

<!-- Laporan & Pengelolaan -->
<div class="section" id="sectionLaporan">
  <div class="card">
    <h2>Laporan Pembayaran & Pengelolaan</h2>
    <div style="margin-bottom:10px;">
      <button onclick="resetData()">Reset Data</button>
      <button onclick="exportLaporanCSV()">Export Data Lengkap</button>
    </div>
    <div>
      <label for="filterBulan">Filter Bulan:</label>
      <input type="month" id="filterBulan" onchange="renderLaporan()" />
    </div>
    <table id="tabelLaporan">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Anggota</th>
          <th>Kategori</th>
          <th>Jumlah (Rp)</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  // Data utama
  let anggota = JSON.parse(localStorage.getItem('anggota')) || [];
  let pembayaran = JSON.parse(localStorage.getItem('pembayaran')) || [];

  // Fungsi cek tunggakan
  function cekTunggakan() {
    const anggotaPilih = document.getElementById('selectAnggota').value;
    const infoDiv = document.getElementById('tunggakanInfo');
    const qrisImg = document.getElementById('qrisCode');

    if(!anggotaPilih){
      infoDiv.innerText='';
      qrisImg.style.display='none';
      return;
    }

    // Hitung total pembayaran anggota
    const totalPaid= pembayaran
      .filter(p => p.anggota===anggotaPilih)
      .reduce((acc,p)=>acc+p.jumlah,0);

    // Asumsi iuran rutin per bulan Rp 50.000
    const iuranPerBulan=50000;

    // Hitung tunggakan (misal: pembayaran belum sesuai target)
    // Untuk simplifikasi, kita anggap tunggakan jika total bayar kurang dari Rp 50.000
    if(totalPaid < iuranPerBulan){
      const tunggakan= iuranPerBulan - totalPaid;
      infoDiv.innerText=`Tunggakan Rp ${tunggakan}. Pembayaran via QRIS akan muncul jika ingin bayar kekurangan.`;
      
      // Generate QRIS jika ada tunggakan
      qrisImg.src='https://api.qrserver.com/v1/create-qr-code/?data=Bayar%20tunggakan%20Rp%20'+tunggakan+'&size=200x200';
      qrisImg.style.display='block';
    } else {
      infoDiv.innerText='Tidak ada tunggakan.';
      qrisImg.style.display='none';
    }
  }

  // Fungsi Tambah Anggota
  function tambahAnggota() {
    const nama = document.getElementById('namaAnggota').value.trim();
    if(!nama){
      alert('Isi nama anggota!');
      return;
    }
    if(anggota.includes(nama)){
      alert('Nama sudah terdaftar!');
      return;
    }
    anggota.push(nama);
    localStorage.setItem('anggota', JSON.stringify(anggota));
    document.getElementById('namaAnggota').value='';
    renderDaftarAnggota();
    renderPilihanAnggota();
  }

  function renderDaftarAnggota() {
    const tbody = document.querySelector('#tabelAnggota tbody');
    tbody.innerHTML='';
    anggota.forEach((a, index) => {
      tbody.innerHTML+=`
        <tr>
          <td>${a}</td>
          <td>
            <button class="btn-small" onclick="editAnggota('${a}')">Edit</button>
            <button class="btn-small" onclick="hapusAnggota('${a}')">Hapus</button>
          </td>
        </tr>`;
    });
  }

  function hapusAnggota(nama) {
    if(confirm('Hapus anggota ini?')){
      anggota = anggota.filter(a => a!==nama);
      localStorage.setItem('anggota', JSON.stringify(anggota));
      renderDaftarAnggota();
      renderPilihanAnggota();
    }
  }

  function editAnggota(nama) {
    const newNama=prompt('Edit nama:',nama);
    if(newNama){
      newNama.trim();
      if(newNama && !anggota.includes(newNama)){
        anggota=anggota.map(a=>a===nama?newNama:a);
        localStorage.setItem('anggota', JSON.stringify(anggota));
        renderDaftarAnggota();
        renderPilihanAnggota();
      }
    }
  }

  function renderPilihanAnggota() {
    const select = document.getElementById('selectAnggota');
    select.innerHTML='<option value="">Pilih Anggota</option>';
    anggota.forEach(a => {
      select.innerHTML+=`<option value="${a}">${a}</option>`;
    });
  }

  // Proses pembayaran
  function prosesPembayaran() {
    const anggotaPilih = document.getElementById('selectAnggota').value;
    const jumlah = parseInt(document.getElementById('jumlahBayar').value);
    const kategori= document.getElementById('kategoriIuran').value;
    if(!anggotaPilih || isNaN(jumlah) || jumlah<=0){
      alert('Isi data dengan benar!');
      return;
    }

    // Jika anggota punya tunggakan, tampilkan QRIS
    const totalPaid= pembayaran
      .filter(p => p.anggota===anggotaPilih)
      .reduce((acc,p)=>acc+p.jumlah,0);
    const iuranPerBulan=50000;
    if(totalPaid < iuranPerBulan){
      alert('Harap bayar kekurangan via QRIS');
      cekTunggakan(); // refresh info tunggakan
      return;
    }

    const now= new Date();
    pembayaran.push({anggota: anggotaPilih, jumlah, tanggal: now, kategori});
    localStorage.setItem('pembayaran', JSON.stringify(pembayaran));
    document.getElementById('jumlahBayar').value='';
    renderLaporan();
    renderStatistik();
    alert('Pembayaran berhasil!');
  }

  function renderLaporan() {
    const tbody= document.querySelector('#tabelLaporan tbody');
    tbody.innerHTML='';
    const filterBulan= document.getElementById('filterBulan').value;
    let totalBulanan=0;
    pembayaran.forEach(p => {
      const pDate= new Date(p.tanggal);
      if(filterBulan){
        const [tahun, bulan]= filterBulan.split('-');
        if(pDate.getFullYear()!==parseInt(tahun) || pDate.getMonth()!==parseInt(bulan)-1){
          return;
        }
      }
      tbody.innerHTML+=`
        <tr>
          <td>${pDate.toLocaleString()}</td>
          <td>${p.anggota}</td>
          <td>${p.kategori}</td>
          <td>Rp ${p.jumlah}</td>
          <td>
            <button class="btn-small" onclick="hapusPembayaran('${p.tanggal}')">Hapus</button>
            <button class="btn-small" onclick="editPembayaran('${p.tanggal}')">Edit</button>
          </td>
        </tr>`;
      if(!filterBulan) totalBulanan+=p.jumlah;
    });
    document.getElementById('trenBulanan').innerText='Rp '+totalBulanan;
  }

  function hapusPembayaran(tanggalStr) {
    if(confirm('Hapus transaksi ini?')){
      pembayaran= pembayaran.filter(p => p.tanggal!==tanggalStr);
      localStorage.setItem('pembayaran', JSON.stringify(pembayaran));
      renderLaporan();
    }
  }

  function editPembayaran(tanggalStr) {
    const p= pembayaran.find(p => p.tanggal===tanggalStr);
    if(p){
      const newJumlah= prompt('Jumlah baru (Rp):', p.jumlah);
      if(newJumlah && !isNaN(newJumlah) && newJumlah>0){
        p.jumlah= parseInt(newJumlah);
        localStorage.setItem('pembayaran', JSON.stringify(pembayaran));
        renderLaporan();
        renderStatistik();
      }
    }
  }

  function renderStatistik() {
    let total=0;
    pembayaran.forEach(p => total+=p.jumlah);
    document.getElementById('totalPembayaran').innerText='Rp '+total;
    document.getElementById('jumlahAnggota').innerText=anggota.length;
  }

  function resetData() {
    if(confirm('Yakin ingin reset semua data?')){
      localStorage.clear();
      anggota=[];
      pembayaran=[];
      localStorage.removeItem('users');
      loadUserData();
      renderDaftarAnggota();
      renderPilihanAnggota();
      renderLaporan();
      renderStatistik();
    }
  }

  function exportLaporanCSV() {
    let csv='Tanggal,Anggota,Kategori,Jumlah\n';
    pembayaran.forEach(p => {
      csv+=`${new Date(p.tanggal).toLocaleString()},${p.anggota},${p.kategori},${p.jumlah}\n`;
    });
    const blob= new Blob([csv], {type:'text/csv'});
    const url= URL.createObjectURL(blob);
    const a= document.createElement('a');
    a.href= url;
    a.download='laporan_iuran_lengkap.csv';
    a.click();
  }

  // Inisialisasi
  renderDaftarAnggota();
  renderPilihanAnggota();
  renderLaporan();
  renderStatistik();

</script>
</body>
</html>
